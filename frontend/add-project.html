<!-- Purpose: Provides the form for adding a new project and uploading a certification file. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Project | Student Portfolio Platform</title>
    <link rel="stylesheet" href="/frontend/css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Student Workspace</p>
          <h2>Project Submission</h2>
        </div>
        <nav class="nav-links">
          <a href="/dashboard" class="nav-link">Dashboard</a>
          <a href="/add-project" class="nav-link active">Add Project</a>
          <a href="/projects" class="nav-link">My Projects</a>
        </nav>
        <button class="secondary-button theme-toggle" type="button" data-theme-toggle>Dark Mode</button>
        <button id="logout-button" class="secondary-button">Logout</button>
      </aside>

      <main class="content">
        <header class="page-header compact">
          <div>
            <p class="eyebrow">New Submission</p>
            <h1>Add Project</h1>
          </div>
        </header>

        <section class="card">
          <form id="project-form" class="project-form">
            <input type="hidden" id="project-id" />

            <label>
              <span>Project Title</span>
              <input type="text" id="title" name="title" required />
            </label>

            <label>
              <span>Description</span>
              <textarea id="description" name="description" rows="5" required></textarea>
            </label>

            <label>
              <span>GitHub URL</span>
              <input type="url" id="githubUrl" name="githubUrl" required />
            </label>

            <label>
              <span>Certification File</span>
              <input type="file" id="certificationFile" name="certificationFile" />
            </label>

            <div class="button-row">
              <button type="submit" class="primary-button">Save Project</button>
              <a href="/projects" class="secondary-link">View Projects</a>
            </div>
          </form>

          <div id="project-message" class="message"></div>
        </section>
      </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/projects.js"></script>
  </body>
</html>
