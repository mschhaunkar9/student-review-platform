<!-- Purpose: Provides the student login and registration interface. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Portfolio Platform</title>
    <link rel="stylesheet" href="/frontend/css/style.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="hero-panel">
        <p class="eyebrow">Student Portfolio Verification</p>
        <h1>Show verified work with a clean academic portfolio.</h1>
        <p class="hero-copy">
          Register, submit projects, manage certifications, and track approval
          status from one place.
        </p>
      </section>

      <section class="card auth-card">
        <div class="auth-topbar">
          <button class="secondary-button" type="button" data-theme-toggle>Dark Mode</button>
        </div>
        <div class="tab-row">
          <button class="tab-button active" data-tab="login">Login</button>
          <button class="tab-button" data-tab="register">Register</button>
        </div>

        <div id="auth-message" class="message"></div>

        <form id="login-form" class="auth-form">
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" required />
          </label>
          <button type="submit" class="primary-button">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <label>
            <span>Name</span>
            <input type="text" name="name" placeholder="Your full name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Create password" required />
          </label>
          <button type="submit" class="primary-button">Register</button>
        </form>
      </section>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
